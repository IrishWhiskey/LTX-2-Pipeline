build:
  gpu: true
  cuda: "12.8"
  python_version: "3.11"
  system_packages:
    - "ffmpeg"
    - "libgl1"
    - "libglib2.0-0"
  python_requirements: "packages/ltx-replicate/requirements.txt"
  run:
    - command: python -c "import os; token = open('/run/secrets/hf_token').read().strip() if os.path.exists('/run/secrets/hf_token') else os.environ.get('HF_TOKEN'); os.environ['HF_TOKEN'] = token if token else ''; import huggingface_hub; huggingface_hub.login(token=token) if token else None; hf_hub_download = huggingface_hub.hf_hub_download; snapshot_download = huggingface_hub.snapshot_download; hf_hub_download('Lightricks/LTX-2.3', 'ltx-2.3-22b-distilled.safetensors', local_dir='/weights', local_dir_use_symlinks=False); hf_hub_download('Lightricks/LTX-2.3', 'ltx-2.3-spatial-upscaler-x2-1.0.safetensors', local_dir='/weights', local_dir_use_symlinks=False); snapshot_download('google/gemma-3-12b-it-qat-q4_0-unquantized', local_dir='/weights/gemma-3-12b', local_dir_use_symlinks=False)" && rm -rf /root/.cache/huggingface
      mounts:
        - type: secret
          id: hf_token
          target: /run/secrets/hf_token
predict: "packages/ltx-replicate/predict.py:Predictor"
